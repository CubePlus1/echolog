services:
  postgres:
    image: postgres:16-alpine
    container_name: echolog-db
    environment:
      POSTGRES_DB: echolog
      POSTGRES_USER: echolog
      POSTGRES_PASSWORD: echolog
    ports:
      - "5436:5432"
    volumes:
      - echolog_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  echolog_data:
